name: Frontend CI

on:
  push:
    branches: [ develop, main, 'feature/*' ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/med-manager-front/package-lock.json'
      
      - name: Install dependencies
        run: cd frontend/med-manager-front && npm install
      
      - name: Type check
        run: cd frontend/med-manager-front && npm run type-check 2>/dev/null || true
      
      - name: Build
        run: cd frontend/med-manager-front && npm run build
