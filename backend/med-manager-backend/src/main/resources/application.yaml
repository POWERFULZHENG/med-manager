spring:
  application:
    name: med-manager-backend
  profiles:
    active: prod-local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/med_manager?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: med_user
    password: MedManager@2024

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,logfile
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

ocr:
  enabled: ${OCR_ENABLED:true}
  baidu:
    api-key: ${OCR_BAIDU_API_KEY:}
    secret-key: ${OCR_BAIDU_SECRET_KEY:}
    url: https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic
    token-url: https://aip.baidubce.com/oauth/2.0/token

mail:
  expire:
    enabled: ${EXPIRE_REMINDER_ENABLED:true}

file:
  upload:
    path: ${UPLOAD_PATH:./upload}

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.xzzj.medmanager: INFO
    com.xzzj.medmanager.mapper: DEBUG
  file:
    path: ./logs

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-256-bits-long-please-change-this}
  expiration: 86400000
